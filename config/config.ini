[MODBUS]
# Modbus TCP/IP 配置
# 本地測試: 127.0.0.1 或 localhost
# 生產環境: 192.168.1.103
HOST=192.168.1.103
PORT=502
TIMEOUT=10
RETRIES=3

[ROBOT_ARM]
# 六軸機械臂配置
MAX_SPEED=100
MIN_SPEED=1
ACCELERATION=50

[SERVO_CONTROL]
# 伺服使能測試配置（依目前 Modbus 對照表）
# D16: 寫入 1 = Servo ON（全軸）
# D16: 寫入 2 = Servo OFF（全軸）
SERVO_REGISTER=16
SERVO_ON_VALUE=1
SERVO_OFF_VALUE=2

# RL 程式執行控制（如需使用）
RL_RUN_REGISTER=513
RL_STOP_REGISTER=514

[IO_CONTROL]
# IO 控制配置（使用寄存器 766 (0x02FE) 控制所有 DO）
# 每個 DO 對應一個位元位置

# 第一組膠閥：圍壩膠（DO-7）
# 圍壩膠開啟: DO-7 → 寄存器766, bit 6 → 值 0x0040
VALVE_ON_REGISTER=766
VALVE_ON_VALUE=0x0040
# 圍壩膠關閉: DO-7 → 寄存器766, 關閉 → 值 0x0000
VALVE_OFF_REGISTER=766
VALVE_OFF_VALUE=0x0000

# 第一組氣缸：圍壩膠伸縮汽缸（DO-3/DO-4）
# 氣缸伸出: DO-3 → 寄存器766, bit 2 → 值 0x0004
CYLINDER_1_EXTEND_REGISTER=766
CYLINDER_1_EXTEND_VALUE=0x0004
# 氣缸縮回: DO-4 → 寄存器766, bit 3 → 值 0x0008
CYLINDER_1_RETRACT_REGISTER=766
CYLINDER_1_RETRACT_VALUE=0x0008

# 第二組膠閥：熱固化三防滴膠閥（DO-1/DO-2）
# 熱固化三防膠開啟: DO-1 → 寄存器766, bit 0 → 值 0x0001
VALVE_2_ON_REGISTER=766
VALVE_2_ON_VALUE=0x0001
# 熱固化三防膠關閉: DO-2 → 寄存器766, bit 1 → 值 0x0002
VALVE_2_OFF_REGISTER=766
VALVE_2_OFF_VALUE=0x0002

# 第二組氣缸：熱固化三防膠伸縮汽缸（DO-5/DO-6）
# 氣缸伸出: DO-5 → 寄存器766, bit 4 → 值 0x0010
CYLINDER_2_EXTEND_REGISTER=766
CYLINDER_2_EXTEND_VALUE=0x0010
# 氣缸縮回: DO-6 → 寄存器766, bit 5 → 值 0x0020
CYLINDER_2_RETRACT_REGISTER=766
CYLINDER_2_RETRACT_VALUE=0x0020

GLUE_STATE_INPUT=0

[DRA_STUDIO]
# DRA Studio 塗膠路徑配置
# DRA Studio 安裝路徑
DRA_INSTALL_PATH=C:\DRA\Projects
# 塗膠路徑程式副檔名
GLUE_PATH_EXTENSION=.rl
# 自動塗膠控制線圈地址
AUTO_GLUE_COIL=2

[DRA_ROBOT_MODBUS]
# 台達 DRV9 六軸機械手臂 Modbus 寄存器配置
# 注意：將以下配置與實際台達控制器的寄存器地址對應

# 控制器連線方式
# 對於實際台達設備，修改 MODBUS 段的 HOST 與 PORT
# DELTA_IP=192.168.1.100
# DELTA_PORT=502

# 路徑執行寄存器組
PATH_EXECUTE_REGISTER=1000
PATH_STATUS_REGISTER=1001
PATH_ERROR_REGISTER=1002
ROBOT_BUSY_REGISTER=1003

# 塗膠閥類型配置
# 機械手臂支持三種涂膠閥
VALVE_TYPE_1_NAME=圍壩膠塗膠
VALVE_TYPE_1_REGISTER=2000
VALVE_TYPE_2_NAME=熱固三防滴膠
VALVE_TYPE_2_REGISTER=2001
VALVE_TYPE_3_NAME=熱固化三防滴膠閥
VALVE_TYPE_3_REGISTER=2002

# 路徑編號對應表 (需根據 DRAStudio 配置調整)
# 格式範例：
# 编号1 = 标准方形涂胶路径
# 编号2 = 圆形应边涂胶路径
# 编号3 = 复杂轨迹涂胶路径
# 编号4 = 快速模式涂胶路径

PATH_STANDARD_SQUARE=1               # 路徑編號1 - 標準方形
PATH_CIRCULAR_EDGE=2                 # 路徑編號2 - 圓形封邊
PATH_COMPLEX_TRAJECTORY=3            # 路徑編號3 - 複雜軌跡
PATH_FAST_MODE=4                     # 路徑編號4 - 快速模式

[UI]
# UI 配置
WINDOW_WIDTH=800
WINDOW_HEIGHT=600
WINDOW_TITLE=Robot Arm Control System
# 字體大小配置 (統一為 32px)
CONNECTION_LABEL_FONT_SIZE=32
BUTTON_FONT_SIZE=32
STATUS_LABEL_FONT_SIZE=32
CONTROL_BUTTON_FONT_SIZE=32
